name: Deploy VPS RenovaBit

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-renovabit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, Linux, ARM64]

    env:
      DEPLOY_PATH: /opt/docker/renovabit

    steps:
      - name: Actualizar repo en VPS
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch origin main
          git reset --hard origin/main

      - name: Verificar archivos de entorno
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          for f in .env.api .env.db; do
            if [ ! -f "$f" ]; then
              echo "::error::$f no existe en $DEPLOY_PATH"
              exit 1
            fi
            echo "[+] $f encontrado"
          done

      - name: Tag imágenes actuales como prev (rollback)
        shell: bash
        run: |
          for img in renovabit-api renovabit-admin; do
            docker tag "renovabit-$img:latest" "renovabit-$img:prev" 2>/dev/null && \
              echo "[+] Tagged $img:prev" || echo "[i] No hay imagen previa de $img"
          done

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          docker compose build

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          docker compose up -d

      - name: Verificar containers activos
        shell: bash
        run: |
          sleep 5
          for svc in renovabit-postgres renovabit-api renovabit-admin; do
            STATUS=$(docker inspect --format='{{.State.Status}}' "$svc" 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "running" ]; then
              echo "[+] $svc está running"
            else
              echo "[!] $svc no está running (status: $STATUS)"
              docker logs "$svc" --tail=20 2>&1
              exit 1
            fi
          done

      - name: Rollback automático (si deploy falló)
        if: failure()
        shell: bash
        run: |
          echo "[!] Deploy falló — restaurando versión previa..."
          for img in renovabit-api renovabit-admin; do
            if docker image inspect "renovabit-$img:prev" &>/dev/null; then
              docker tag "renovabit-$img:prev" "renovabit-$img:latest"
              echo "[-] Restaurado $img:prev → $img:latest"
            fi
          done
          cd "$DEPLOY_PATH"
          docker compose up -d

      - name: Limpiar imágenes antiguas (>24h)
        if: success()
        shell: bash
        run: |
          docker image prune -f --filter "until=24h"

      - name: Notificar éxito
        if: success()
        shell: bash
        run: |
          curl -s -X POST "${{ vars.GOTIFY_URL }}/message" \
            -H "X-Gotify-Key: ${{ secrets.GOTIFY_APP_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"title": "[+] Deploy exitoso - Renovabit", "message": "API y Admin desplegados correctamente.", "priority": 5}'

      - name: Notificar fallo
        if: failure()
        shell: bash
        run: |
          cd "$DEPLOY_PATH"
          LOGS=$(docker compose logs --tail=20 2>&1)
          {
            echo "[!] Deploy falló - Renovabit"
            echo ""
            echo "Logs:"
            echo "$LOGS"
          } | jq -Rs '{title: "[!] Deploy falló - Renovabit", message: ., priority: 8}' | \
          curl -s -X POST "${{ vars.GOTIFY_URL }}/message" \
            -H "X-Gotify-Key: ${{ secrets.GOTIFY_APP_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @-
