services:
  renovabit-postgres:
    container_name: renovabit-postgres
    image: postgres:18.4
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./docker-volumes/postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renovabit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - renovabit

networks:
  renovabit:
    name: renovabit
    driver: bridge
