pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    format-astro:
      glob: "*.astro"
      run: bunx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    lint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    check:
      run: npx biome check .
    check-types:
      run: bun run check-types
